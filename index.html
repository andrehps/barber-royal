<!DOCTYPE html>
<html lang="en>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royal Cut Barbershop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body{
      background:#0f0f0f;
      color:white;
      font-family:Poppins;
    }

    .navbar{
      background:rgba(0,0,0,0.9);
    }

    .navbar-brand{
      color:#d4af37 !important;
      font-weight:700;
    }

    .hero{
      min-height:100vh;
      display:flex;
      align-items:center;
     background: url('Images/background-img.jpg') center/cover;
    }

    .gold{ color:#d4af37; }
    .btn-gold{
      background:#d4af37;
      color:black;
      padding:12px 24px;
      border-radius:10px;
      text-decoration:none;
    }
  </style>
</head>


<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
  <div class="container">
    <a class="navbar-brand">Royal Cut</a>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <h1>Modern Style <span class="gold">Perfect Cuts</span></h1>
    <p>Premium barbershop experience</p>
    <a class="btn btn-gold">Book Appointment</a>
  </div>
</section>


<section id="about" class="py-5">
  <div class="container py-5">

    <div class="row align-items-center g-5">

      <div class="col-lg-6">
        <img src="https://images.unsplash.com/photo-1517832606299-7ae9b720a186"
             class="img-fluid rounded-4">
      </div>

      <div class="col-lg-6">
        <h2 class="gold">More Than A Haircut</h2>
        <p>Premium grooming experience.</p>

        <div class="row mt-4">
          <div class="col-6">
            <div class="p-3 border rounded">
              <h3 class="gold">8+</h3>
              <p>Years</p>
            </div>
          </div>

          <div class="col-6">
            <div class="p-3 border rounded">
              <h3 class="gold">5K+</h3>
              <p>Clients</p>
            </div>
          </div>

        </div>

      </div>

    </div>

  </div>
  </section>

</body>
</html>
